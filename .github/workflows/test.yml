name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Install dependencies
      run: npm install

    - name: Verify Web and Android Code
      run: npm run verify

    - name: Install example app dependencies
      run: npm install
      working-directory: example

    - name: Run example app tests
      run: npm test
      working-directory: example

    - name: Build example app web assets
      run: npm run build
      working-directory: example

    - name: Build example app Android APK
      run: npx cap sync android && cd android && ./gradlew assembleDebug
      working-directory: example
